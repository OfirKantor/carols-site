<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>צור קשר - קרול לייזרוביץ</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <div id="nav-placeholder"></div>

    <section class="bg-gradient-to-br from-[#1e3a5f] to-[#2563eb] text-white py-20 min-h-[400px] flex items-center">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
        
        <div class="text-right max-w-3xl ml-auto px-6 text-xl leading-relaxed md:text-2xl space-y-4">
          <h2 class="text-4xl md:text-5xl font-bold mb-6">צור קשר</h2>
          <p class="text-xl text-slate-200 leading-relaxed mb-4 font-semibold">
            אשמח לשמוע עליכם ולסייע בכל שאלה או צורך בתחום תקני האיכות. מלאו את הפרטים ואחזור אליכם בהקדם
          </p>
        </div>

      </div>
    </section>
    
    <main class="max-w-7xl mx-auto px-4 py-12">
      <section class="w-full bg-slate-50 py-20 px-4 mb-12">
        <div class="max-w-7xl mx-auto">
          
          <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
           <div class="bg-white p-8 md:p-12 rounded-2xl shadow-xl border border-slate-100 w-full md:col-span-2 mx-auto" dir="rtl">
  
              <h3 class="text-3xl font-bold text-[#1e3a5f] mb-3 text-right">שלח פנייה</h3>
              <p class="text-slate-600 text-lg mb-10 text-right">מלא/י את הפרטים ואחזור אליך תוך 24 שעות</p>
              
              <form action="https://api.web3forms.com/submit" method="POST" class="space-y-6">
                
                <input type="hidden" name="access_key" value="1cf6bb2a-cf53-4fde-b578-6fc36893bf40">
                <input type="hidden" name="subject" value="פנייה חדשה מהאתר">
                <input type="hidden" name="from_name" value="אתר ניהול איכות">
                <input type="checkbox" name="botcheck" class="hidden" style="display: none;">
                <input type="hidden" name="redirect" value="YOUR_REDIRECT_URL_HERE">


                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                  
                  <div>
                    <label for="name" class="block text-sm font-medium text-[#1e3a5f] mb-2 text-right">
                      שם מלא <span class="text-red-500">*</span>
                    </label>
                    <input type="text" name="שם" id="name" placeholder="שם מלא" required
                          class="w-full border border-slate-300 rounded-lg p-3 text-slate-900 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-[#2563eb]/30 focus:border-[#2563eb] transition duration-200">
                  </div>

                  <div>
                    <label for="phone" class="block text-sm font-medium text-[#1e3a5f] mb-2 text-right">
                      טלפון <span class="text-red-500">*</span>
                    </label>
                    <input type="tel" name="מספר טלפון" id="phone" placeholder="050-1234567" required
                          class="w-full border border-slate-300 rounded-lg p-3 text-slate-900 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-[#2563eb]/30 focus:border-[#2563eb] transition duration-200">
                  </div>

                  <div>
                    <label for="email" class="block text-sm font-medium text-[#1e3a5f] mb-2 text-right">
                      אימייל <span class="text-red-500">*</span>
                    </label>
                    <input type="email" name="כתובת מייל" id="email" placeholder="email@example.com" required
                          class="w-full border border-slate-300 rounded-lg p-3 text-slate-900 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-[#2563eb]/30 focus:border-[#2563eb] transition duration-200">
                  </div>

                  <div>
                    <label for="company" class="block text-sm font-medium text-[#1e3a5f] mb-2 text-right">
                      שם החברה
                    </label>
                    <input type="text" name="חברה" id="company" placeholder="שם החברה שלך"
                          class="w-full border border-slate-300 rounded-lg p-3 text-slate-900 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-[#2563eb]/30 focus:border-[#2563eb] transition duration-200">
                  </div>

                </div> 
                
                <div>
                  <label for="selected_standard" class="block text-sm font-medium text-[#1e3a5f] mb-2 text-right">
                    התקן המעניין אותך
                  </label>
                  <div class="relative">
                    <select name="סוג תקן" id="selected_standard" required
                            class="w-full border border-slate-300 rounded-lg p-3 text-slate-900 placeholder:text-slate-500 appearance-none focus:outline-none focus:ring-2 focus:ring-[#2563eb]/30 focus:border-[#2563eb] transition duration-200 invalid:text-slate-500">
                      <option value="" disabled selected>בחר תקן</option>
                      <option value="AS9100">AS9100 - תעופה וחלל</option>
                      <option value="ISO 9001">ISO 9001 - ניהול איכות</option>
                      <option value="ISO 13485">ISO 13485 - מכשור רפואי</option>
                      <option value="other">אחר / ייעוץ כללי</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center px-4 text-slate-500">
                      <i data-lucide="chevron-down" class="w-5 h-5"></i>
                    </div>
                  </div>
                </div>

                <div>
                  <label for="message" class="block text-sm font-medium text-[#1e3a5f] mb-2 text-right">
                    הודעה <span class="text-red-500">*</span>
                  </label>
                  <textarea name="הודעה" id="message" placeholder="...ספר/י לנו על הצרכים שלך" required rows="6"
                            class="w-full border border-slate-300 rounded-lg p-3 text-slate-900 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-[#2563eb]/30 focus:border-[#2563eb] transition duration-200 resize-none"></textarea>
                </div>

                <div class="pt-4">
                  <button type="submit"
                          class="w-full bg-gradient-to-b from-[#2563eb] to-[#1e3a5f] hover:from-[#1e40af] hover:to-[#152c4a] text-white text-xl font-bold py-4 px-8 rounded-xl flex items-center justify-center gap-3 shadow-lg hover:shadow-2xl transform hover:-translate-y-0.5 transition duration-300">
                    <span>שלח פנייה</span>
                    <i data-lucide="send" class="w-6 h-6"></i>
                  </button>
                </div>

              </form>
            </div>

            <div class="bg-white p-8 md:p-10 rounded-2xl shadow-lg border border-slate-100 h-fit">
              
              <h3 class="text-2xl font-bold text-[#1e3a5f] mb-8 text-right">פרטי התקשרות</h3>

              <ul class="space-y-8">
                
                <li class="flex items-center gap-5 justify-start">
                  <div class="w-14 h-14 bg-[#2563eb] text-white rounded-2xl flex items-center justify-center shadow-md shrink-0">
                    <i data-lucide="phone" class="w-7 h-7"></i>
                  </div>
                  <div class="text-right">
                    <span class="text-lg font-semibold text-[#1e3a5f]">טלפון</span>
                    <a href="tel:0545634083" class="block text-slate-600 text-lg hover:text-[#2563eb] transition-colors">054-5634083</a>
                  </div>
                </li>

                <li class="flex items-center gap-5 justify-start">
                  <div class="w-14 h-14 bg-[#2563eb] text-white rounded-2xl flex items-center justify-center shadow-md shrink-0">
                    <i data-lucide="mail" class="w-7 h-7"></i>
                  </div>
                  <div class="text-right">
                    <span class="text-lg font-semibold text-[#1e3a5f]">אימייל</span>
                    <a href="mailto:carol.leiz@gmail.com" class="block text-slate-600 text-lg hover:text-[#2563eb] transition-colors">carol.leiz@gmail.com</a>
                  </div>
                </li>

                <li class="flex items-center gap-5 justify-start">
                  <div class="w-14 h-14 bg-[#2563eb] text-white rounded-2xl flex items-center justify-center shadow-md shrink-0">
                    <i data-lucide="map-pin" class="w-7 h-7"></i>
                  </div>
                  <div class="text-right">
                    <span class="text-lg font-semibold text-[#1e3a5f]">מיקום</span>
                    <span class="block text-slate-600 text-lg">אזור המרכז, ישראל</span>
                  </div>
                </li>

              </ul>
            </div>

          </div>
        </div>
      </section>
    </main>

    <div id="footer-placeholder"></div>

         <script src="https://unpkg.com/lucide@latest"></script>

    <script>
      // 2. Define a function to refresh icons
      function refreshIcons() {
        if (window.lucide) {
          lucide.createIcons();
        }
      }

      // 3. Handle Navbar/Footer Loading
      fetch('./_nav-footer.html')
        .then(r => {
            if (!r.ok) throw new Error("Network response was not ok");
            return r.text();
        })
        .then(html => {
          const tmp = document.createElement('div');
          tmp.innerHTML = html;
          const nav = tmp.querySelector('nav');
          const footer = tmp.querySelector('footer');
          
          if (nav) document.getElementById('nav-placeholder').appendChild(nav);
          if (footer) document.getElementById('footer-placeholder').appendChild(footer);
          
          document.querySelector('main').style.paddingTop = '80px';
          
          // CRITICAL: Re-run icon generation after inserting the navbar
          refreshIcons();
        })
        .catch(err => {
            console.error("Failed to load navbar/footer:", err);
            // Even if nav fails, we still want icons for the main content
            refreshIcons();
        });

      // 4. Initial Icon Load (for the main content)
      document.addEventListener('DOMContentLoaded', refreshIcons);
    </script>
  </body>
</html>
